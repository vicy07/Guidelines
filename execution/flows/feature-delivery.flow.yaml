id: feature_delivery_v1
name: Feature Delivery Flow
version: 1.0.0
steps:
  - id: define_requirement
    role: BA
    input_schema: null
    output_schema: execution/schemas/requirement.json
  - id: implement
    role: SWE
    input_schema: execution/schemas/requirement.json
    output_schema: execution/schemas/task.json
  - id: test
    role: QA
    input_schema: execution/schemas/task.json
    output_schema: execution/schemas/test.json
  - id: release
    role: SRE
    input_schema: execution/schemas/test.json
    output_schema: execution/schemas/release.json
rules:
  - block_on_validation_failure: true
  - require_role_ownership: true
