version: 3.7.0
owners:
  repository: Repository Maintainer
  requirements_primary: BA
  requirements_co_owner: PO
  ux_guidelines_owner: UX

phase_model:
  index_file: phases-index.md
  phases:
    - id: discovery
      primary_roles: [PO, BA, SWE, QA, SRE]
    - id: solution-design
      primary_roles: [BA, SWE, SRE, QA]
    - id: implementation
      primary_roles: [BA, SWE, QA, SRE]
    - id: verification
      primary_roles: [BA, QA, SWE, SRE]
    - id: operations
      primary_roles: [BA, SRE, SWE, QA]
  roles:
    - PO
    - BA
    - UX
    - SWE
    - QA
    - SRE

domains:
  governance:
    path: .
    files:
      - path: README.md
        kind: supporting
        requires_metadata: false
      - path: Repository.md
        kind: supporting
        requires_metadata: false
      - path: Product-Repository-Blueprint.md
        kind: supporting
        requires_metadata: false
      - path: Adoption-Guide.md
        kind: supporting
        requires_metadata: false
      - path: AGENTS.md
        kind: supporting
        requires_metadata: false
      - path: phases-index.md
        kind: normative
        requires_metadata: true

  agents:
    path: Agents
    files:
      - path: Agents/README.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/README.md
      - path: Agents/BA.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/requirements/README.md
          - Areas/requirements/mission-standard.md
          - Areas/requirements/use-cases-standard.md
          - Areas/requirements/user-flows-standard.md
      - path: Agents/PO.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/requirements/README.md
          - Areas/requirements/mission-standard.md
          - Areas/requirements/use-cases-standard.md
      - path: Agents/UX.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/ux/README.md
          - Areas/ux/ui-ux-guidelines-standard.md
          - Areas/requirements/README.md
      - path: Agents/SWE.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/swe/README.md
          - Areas/swe/architecture-guidelines.md
          - Areas/swe/implementation-guidelines.md
          - Areas/swe/security-guidelines.md
      - path: Agents/QA.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/qa/README.md
          - Areas/qa/test-strategy.md
          - Areas/qa/test-case-design.md
          - Areas/qa/test-execution-and-reporting.md
      - path: Agents/SRE.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/sre/README.md
          - Areas/sre/sre-operations-guidelines.md
          - Areas/sre/incident-management-guidelines.md

  requirements:
    path: Areas/requirements
    owner_role: BA
    co_owner_role: PO
    files:
      - path: Areas/requirements/architecture-standard.md
        kind: normative
        requires_metadata: true
      - path: Areas/requirements/code-intelligence-standard.md
        kind: normative
        requires_metadata: true
      - path: Areas/requirements/mission-standard.md
        kind: normative
        requires_metadata: true
      - path: Areas/requirements/use-cases-standard.md
        kind: normative
        requires_metadata: true
      - path: Areas/requirements/user-flows-standard.md
        kind: normative
        requires_metadata: true

  ux:
    path: Areas/ux
    owner_role: UX
    governed_by_roles: [BA, PO]
    files:
      - path: Areas/ux/README.md
        kind: supporting
        requires_metadata: true
      - path: Areas/ux/ui-ux-guidelines-standard.md
        kind: normative
        requires_metadata: true
        consumer_roles: [SWE, QA, SRE]

  swe:
    path: Areas/swe
    files:
      - path: Areas/swe/README.md
        kind: supporting
        requires_metadata: true
      - path: Areas/swe/architecture-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/requirements/mission-standard.md
          - Areas/requirements/use-cases-standard.md
          - Areas/swe/security-guidelines.md
      - path: Areas/swe/c4-architecture-guidelines.md
        kind: supporting
        requires_metadata: false
        depends_on:
          - Areas/swe/architecture-guidelines.md
      - path: Areas/swe/implementation-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/swe/architecture-guidelines.md
          - Areas/qa/test-strategy.md
      - path: Areas/swe/security-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/swe/architecture-guidelines.md
          - Areas/qa/test-strategy.md
      - path: Areas/swe/root-cause-analysis.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/swe/architecture-guidelines.md
          - Areas/qa/bug-verification.md

  qa:
    path: Areas/qa
    files:
      - path: Areas/qa/README.md
        kind: supporting
        requires_metadata: true
      - path: Areas/qa/test-strategy.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/requirements/use-cases-standard.md
          - Areas/swe/security-guidelines.md
      - path: Areas/qa/test-case-design.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/qa/test-strategy.md
      - path: Areas/qa/test-execution-and-reporting.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/qa/test-strategy.md
      - path: Areas/qa/bug-verification.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/requirements/use-cases-standard.md
      - path: Areas/qa/post-fix-testing.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/qa/test-strategy.md
          - Areas/qa/test-execution-and-reporting.md

  sre:
    path: Areas/sre
    files:
      - path: Areas/sre/README.md
        kind: supporting
        requires_metadata: true
      - path: Areas/sre/sre-operations-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/swe/architecture-guidelines.md
          - Areas/qa/test-execution-and-reporting.md
      - path: Areas/sre/incident-management-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Areas/sre/sre-operations-guidelines.md
          - Areas/swe/root-cause-analysis.md
          - Areas/qa/post-fix-testing.md

  shared_guidance:
    path: guidelines
    files:
      - path: guidelines/principles/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/patterns/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/playbooks/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/anti-patterns/ai-misuse.md
        kind: supporting
        requires_metadata: true

  docs:
    path: docs
    files:
      - path: docs/architecture.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/requirements/architecture-standard.md
      - path: docs/architecture/code-intelligence.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - Areas/requirements/code-intelligence-standard.md

  tools_root:
    path: Tools
    files:
      - path: Tools/README.md
        kind: supporting
        requires_metadata: true

  tools_audits:
    path: Tools/audits
    files:
      - path: Tools/audits/README.md
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/__init__.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/cli.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/docker_runner.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/reporting.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/types.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/scanners/__init__.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/scanners/sonar.py
        kind: supporting
        requires_metadata: false
      - path: Tools/audits/audits_runtime/scanners/trivy.py
        kind: supporting
        requires_metadata: false

  tools_sonar:
    path: Tools/sonar
    files:
      - path: Tools/sonar/README.md
        kind: supporting
        requires_metadata: false
      - path: Tools/sonar/sonar_runner.py
        kind: supporting
        requires_metadata: false

  tools_trivy:
    path: Tools/trivy
    files:
      - path: Tools/trivy/README.md
        kind: supporting
        requires_metadata: false
      - path: Tools/trivy/trivy_runner.py
        kind: supporting
        requires_metadata: false

  tools_otel:
    path: Tools/otel
    files:
      - path: Tools/otel/README.md
        kind: supporting
        requires_metadata: false
      - path: Tools/otel/telemetry.py
        kind: supporting
        requires_metadata: false

  tools_code_intel:
    path: Tools/code-intel
    files:
      - path: Tools/code-intel/README.md
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/Dockerfile
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/requirements.txt
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/code_intel_runner.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/example_code_intel.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/__init__.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/cli.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/toolchain.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/scip_adapter.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/ast_grep_adapter.py
        kind: supporting
        requires_metadata: false
      - path: Tools/code-intel/runtime/fallback_tree_sitter.py
        kind: supporting
        requires_metadata: false

update_rules:
  on_change:
    phases-index.md:
      must_review:
        - AGENTS.md
        - Repository.md
        - Product-Repository-Blueprint.md
        - guidelines-index.yaml
    Product-Repository-Blueprint.md:
      must_review:
        - Repository.md
        - README.md
        - Adoption-Guide.md
        - guidelines-index.yaml
    Adoption-Guide.md:
      must_review:
        - Product-Repository-Blueprint.md
        - Repository.md
        - README.md
        - guidelines-index.yaml
    Areas/requirements/use-cases-standard.md:
      must_review:
        - Areas/swe/architecture-guidelines.md
        - Areas/qa/test-strategy.md
        - Areas/qa/bug-verification.md
    Areas/requirements/mission-standard.md:
      must_review:
        - Areas/requirements/use-cases-standard.md
        - Areas/swe/architecture-guidelines.md
        - Areas/qa/test-strategy.md
    Areas/requirements/user-flows-standard.md:
      must_review:
        - Areas/requirements/use-cases-standard.md
        - Areas/qa/test-case-design.md
        - Areas/qa/test-execution-and-reporting.md
    Areas/requirements/code-intelligence-standard.md:
      must_review:
        - Product-Repository-Blueprint.md
        - Areas/swe/architecture-guidelines.md
        - Areas/swe/implementation-guidelines.md
        - Areas/qa/test-strategy.md
        - docs/architecture/code-intelligence.md
    Areas/requirements/architecture-standard.md:
      must_review:
        - Product-Repository-Blueprint.md
        - Areas/swe/architecture-guidelines.md
        - docs/architecture.md
    Areas/ux/ui-ux-guidelines-standard.md:
      must_review:
        - Areas/swe/implementation-guidelines.md
        - Areas/qa/test-case-design.md
        - Areas/qa/test-execution-and-reporting.md
    Areas/swe/security-guidelines.md:
      must_review:
        - Areas/qa/test-strategy.md
        - Areas/swe/implementation-guidelines.md
        - Areas/sre/sre-operations-guidelines.md
    Areas/qa/test-strategy.md:
      must_review:
        - Areas/swe/security-guidelines.md
        - Areas/qa/test-case-design.md
        - Areas/qa/test-execution-and-reporting.md

validation:
  required_metadata_fields:
    - Version
    - Owner
    - Last Updated
  missing_evidence_token: Evidence not available
