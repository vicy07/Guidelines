version: 3.2.0
owners:
  repository: Repository Maintainer
  requirements_primary: BA
  requirements_co_owner: PO

phase_model:
  index_file: phases-index.md
  phases:
    - id: discovery
      primary_roles: [PO, BA, SWE, QA, SRE]
    - id: solution-design
      primary_roles: [BA, SWE, SRE, QA]
    - id: implementation
      primary_roles: [BA, SWE, QA, SRE]
    - id: verification
      primary_roles: [BA, QA, SWE, SRE]
    - id: operations
      primary_roles: [BA, SRE, SWE, QA]
  roles:
    - PO
    - BA
    - SWE
    - QA
    - SRE

domains:
  governance:
    path: .
    files:
      - path: README.md
        kind: supporting
        requires_metadata: false
      - path: Repository.md
        kind: supporting
        requires_metadata: false
      - path: Product-Repository-Blueprint.md
        kind: supporting
        requires_metadata: false
      - path: Adoption-Guide.md
        kind: supporting
        requires_metadata: false
      - path: AGENTS.md
        kind: supporting
        requires_metadata: false
      - path: phases-index.md
        kind: normative
        requires_metadata: true

  requirements:
    path: requirements-standards
    owner_role: BA
    co_owner_role: PO
    files:
      - path: requirements-standards/architecture-standard.md
        kind: normative
        requires_metadata: true
      - path: requirements-standards/code-intelligence-standard.md
        kind: normative
        requires_metadata: true
      - path: requirements-standards/mission-standard.md
        kind: normative
        requires_metadata: true
      - path: requirements-standards/use-cases-standard.md
        kind: normative
        requires_metadata: true
      - path: requirements-standards/user-flows-standard.md
        kind: normative
        requires_metadata: true
      - path: requirements-standards/ui-ux-guidelines-standard.md
        kind: normative
        requires_metadata: true

  swe:
    path: SWE
    files:
      - path: SWE/README.md
        kind: supporting
        requires_metadata: true
      - path: SWE/architecture-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - requirements-standards/mission-standard.md
          - requirements-standards/use-cases-standard.md
          - SWE/security-guidelines.md
      - path: SWE/c4-architecture-guidelines.md
        kind: supporting
        requires_metadata: false
        depends_on:
          - SWE/architecture-guidelines.md
      - path: SWE/implementation-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-strategy.md
      - path: SWE/security-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-strategy.md
      - path: SWE/root-cause-analysis.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/bug-verification.md

  qa:
    path: QA
    files:
      - path: QA/README.md
        kind: supporting
        requires_metadata: true
      - path: QA/test-strategy.md
        kind: normative
        requires_metadata: true
        depends_on:
          - requirements-standards/use-cases-standard.md
          - SWE/security-guidelines.md
      - path: QA/test-case-design.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
      - path: QA/test-execution-and-reporting.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
      - path: QA/bug-verification.md
        kind: normative
        requires_metadata: true
        depends_on:
          - requirements-standards/use-cases-standard.md
      - path: QA/post-fix-testing.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
          - QA/test-execution-and-reporting.md

  sre:
    path: SRE
    files:
      - path: SRE/README.md
        kind: supporting
        requires_metadata: true
      - path: SRE/sre-operations-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-execution-and-reporting.md
      - path: SRE/incident-management-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SRE/sre-operations-guidelines.md
          - SWE/root-cause-analysis.md
          - QA/post-fix-testing.md

  shared_guidance:
    path: guidelines
    files:
      - path: guidelines/principles/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/patterns/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/playbooks/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/anti-patterns/ai-misuse.md
        kind: supporting
        requires_metadata: true

  docs:
    path: docs
    files:
      - path: docs/architecture.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - requirements-standards/architecture-standard.md
      - path: docs/architecture/code-intelligence.md
        kind: supporting
        requires_metadata: true
        depends_on:
          - requirements-standards/code-intelligence-standard.md

  shared_sonar:
    path: shared-sonar
    files:
      - path: shared-sonar/README.md
        kind: supporting
        requires_metadata: false
      - path: shared-sonar/sonar_runner.py
        kind: supporting
        requires_metadata: false

  shared_otel:
    path: shared-otel
    files:
      - path: shared-otel/README.md
        kind: supporting
        requires_metadata: false
      - path: shared-otel/telemetry.py
        kind: supporting
        requires_metadata: false

  shared_code_intel:
    path: shared-code-intel
    files:
      - path: shared-code-intel/README.md
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/Dockerfile
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/requirements.txt
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/code_intel_runner.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/example_code_intel.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/__init__.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/cli.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/toolchain.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/scip_adapter.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/ast_grep_adapter.py
        kind: supporting
        requires_metadata: false
      - path: shared-code-intel/runtime/fallback_tree_sitter.py
        kind: supporting
        requires_metadata: false

  shared_trivy:
    path: shared-trivy
    files:
      - path: shared-trivy/README.md
        kind: supporting
        requires_metadata: false
      - path: shared-trivy/trivy_runner.py
        kind: supporting
        requires_metadata: false

update_rules:
  on_change:
    phases-index.md:
      must_review:
        - AGENTS.md
        - Repository.md
        - Product-Repository-Blueprint.md
        - guidelines-index.yaml
    Product-Repository-Blueprint.md:
      must_review:
        - Repository.md
        - README.md
        - Adoption-Guide.md
        - guidelines-index.yaml
    Adoption-Guide.md:
      must_review:
        - Product-Repository-Blueprint.md
        - Repository.md
        - README.md
        - guidelines-index.yaml
    requirements-standards/use-cases-standard.md:
      must_review:
        - SWE/architecture-guidelines.md
        - QA/test-strategy.md
        - QA/bug-verification.md
    requirements-standards/mission-standard.md:
      must_review:
        - requirements-standards/use-cases-standard.md
        - SWE/architecture-guidelines.md
        - QA/test-strategy.md
    requirements-standards/user-flows-standard.md:
      must_review:
        - requirements-standards/use-cases-standard.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md
    requirements-standards/code-intelligence-standard.md:
      must_review:
        - Product-Repository-Blueprint.md
        - SWE/architecture-guidelines.md
        - SWE/implementation-guidelines.md
        - QA/test-strategy.md
        - docs/architecture/code-intelligence.md
    requirements-standards/architecture-standard.md:
      must_review:
        - Product-Repository-Blueprint.md
        - SWE/architecture-guidelines.md
        - docs/architecture.md
    requirements-standards/ui-ux-guidelines-standard.md:
      must_review:
        - SWE/implementation-guidelines.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md
    SWE/security-guidelines.md:
      must_review:
        - QA/test-strategy.md
        - SWE/implementation-guidelines.md
        - SRE/sre-operations-guidelines.md
    QA/test-strategy.md:
      must_review:
        - SWE/security-guidelines.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md

validation:
  required_metadata_fields:
    - Version
    - Owner
    - Last Updated
  missing_evidence_token: Evidence not available
