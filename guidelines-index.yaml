version: 3.0.0
owners:
  repository: Repository Maintainer
  requirements_primary: BA
  requirements_co_owner: PO
  control_plane_owner: Repository Maintainer

phase_model:
  index_file: phases-index.md
  runtime_index_file: runtime/phases.yaml
  phases:
    - id: discovery
      primary_roles: [PO, BA, SWE, QA, SRE]
    - id: solution-design
      primary_roles: [BA, SWE, SRE, QA]
    - id: implementation
      primary_roles: [BA, SWE, QA, SRE]
    - id: verification
      primary_roles: [BA, QA, SWE, SRE]
    - id: operations
      primary_roles: [BA, SRE, SWE, QA]
  roles:
    - PO
    - BA
    - SWE
    - QA
    - SRE

domains:
  governance:
    path: .
    files:
      - path: README.md
        kind: supporting
        requires_metadata: false
      - path: Repository.md
        kind: supporting
        requires_metadata: false
      - path: Product-Repository-Blueprint.md
        kind: supporting
        requires_metadata: false
      - path: AGENTS.md
        kind: supporting
        requires_metadata: false
      - path: phases-index.md
        kind: normative
        requires_metadata: true

  requirements:
    path: Requirements
    owner_role: BA
    co_owner_role: PO
    files:
      - path: Requirements/mission.md
        kind: normative
        requires_metadata: true
      - path: Requirements/use-cases.md
        kind: normative
        requires_metadata: true
      - path: Requirements/user-flows.md
        kind: normative
        requires_metadata: true
      - path: Requirements/ui-ux-guidelines.md
        kind: normative
        requires_metadata: true

  swe:
    path: SWE
    files:
      - path: SWE/README.md
        kind: supporting
        requires_metadata: true
      - path: SWE/architecture-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Requirements/mission.md
          - Requirements/use-cases.md
          - SWE/security-guidelines.md
      - path: SWE/c4-architecture-guidelines.md
        kind: supporting
        requires_metadata: false
        depends_on:
          - SWE/architecture-guidelines.md
      - path: SWE/implementation-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-strategy.md
      - path: SWE/security-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-strategy.md
      - path: SWE/root-cause-analysis.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/bug-verification.md

  qa:
    path: QA
    files:
      - path: QA/README.md
        kind: supporting
        requires_metadata: true
      - path: QA/test-strategy.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Requirements/use-cases.md
          - SWE/security-guidelines.md
      - path: QA/test-case-design.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
      - path: QA/test-execution-and-reporting.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
      - path: QA/bug-verification.md
        kind: normative
        requires_metadata: true
        depends_on:
          - Requirements/use-cases.md
      - path: QA/post-fix-testing.md
        kind: normative
        requires_metadata: true
        depends_on:
          - QA/test-strategy.md
          - QA/test-execution-and-reporting.md

  sre:
    path: SRE
    files:
      - path: SRE/README.md
        kind: supporting
        requires_metadata: true
      - path: SRE/sre-operations-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SWE/architecture-guidelines.md
          - QA/test-execution-and-reporting.md
      - path: SRE/incident-management-guidelines.md
        kind: normative
        requires_metadata: true
        depends_on:
          - SRE/sre-operations-guidelines.md
          - SWE/root-cause-analysis.md
          - QA/post-fix-testing.md

  control_plane_guidelines:
    path: guidelines
    files:
      - path: guidelines/principles/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/patterns/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/playbooks/README.md
        kind: supporting
        requires_metadata: true
      - path: guidelines/anti-patterns/ai-misuse.md
        kind: supporting
        requires_metadata: true

  execution:
    path: execution
    files:
      - path: execution/schemas/requirement.json
        kind: supporting
        requires_metadata: false
      - path: execution/schemas/task.json
        kind: supporting
        requires_metadata: false
      - path: execution/schemas/test.json
        kind: supporting
        requires_metadata: false
      - path: execution/schemas/release.json
        kind: supporting
        requires_metadata: false
      - path: execution/schemas/requirement.schema.json
        kind: supporting
        requires_metadata: false
      - path: execution/schemas/task.schema.json
        kind: supporting
        requires_metadata: false
      - path: execution/prompts/swe.md
        kind: supporting
        requires_metadata: false
      - path: execution/prompts/qa.md
        kind: supporting
        requires_metadata: false
      - path: execution/prompts/swe_implement_feature.md
        kind: supporting
        requires_metadata: true
      - path: execution/flows/feature-delivery.flow.yaml
        kind: supporting
        requires_metadata: false
      - path: execution/examples/feature-flow.md
        kind: supporting
        requires_metadata: true

  agents:
    path: agents
    files:
      - path: agents/BA.md
        kind: supporting
        requires_metadata: true
      - path: agents/SWE.md
        kind: supporting
        requires_metadata: true
      - path: agents/QA.md
        kind: supporting
        requires_metadata: true
      - path: agents/SRE.md
        kind: supporting
        requires_metadata: true

  runtime:
    path: runtime
    files:
      - path: runtime/phases.yaml
        kind: supporting
        requires_metadata: false
      - path: runtime/orchestration.yaml
        kind: supporting
        requires_metadata: false

  docs:
    path: docs
    files:
      - path: docs/architecture.md
        kind: supporting
        requires_metadata: true
      - path: docs/execution-model.md
        kind: supporting
        requires_metadata: true

update_rules:
  on_change:
    phases-index.md:
      must_review:
        - AGENTS.md
        - Repository.md
        - Product-Repository-Blueprint.md
        - guidelines-index.yaml
        - runtime/phases.yaml
    Product-Repository-Blueprint.md:
      must_review:
        - Repository.md
        - README.md
        - guidelines-index.yaml
    Requirements/use-cases.md:
      must_review:
        - SWE/architecture-guidelines.md
        - QA/test-strategy.md
        - QA/bug-verification.md
    Requirements/mission.md:
      must_review:
        - Requirements/use-cases.md
        - SWE/architecture-guidelines.md
        - QA/test-strategy.md
    Requirements/user-flows.md:
      must_review:
        - Requirements/use-cases.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md
    Requirements/ui-ux-guidelines.md:
      must_review:
        - SWE/implementation-guidelines.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md
    SWE/security-guidelines.md:
      must_review:
        - QA/test-strategy.md
        - SWE/implementation-guidelines.md
        - SRE/sre-operations-guidelines.md
    QA/test-strategy.md:
      must_review:
        - SWE/security-guidelines.md
        - QA/test-case-design.md
        - QA/test-execution-and-reporting.md
    runtime/orchestration.yaml:
      must_review:
        - runtime/phases.yaml
        - execution/schemas/requirement.schema.json
        - execution/schemas/task.schema.json
        - agents/BA.md
        - agents/SWE.md
        - agents/QA.md
        - agents/SRE.md
    execution/schemas/requirement.schema.json:
      must_review:
        - agents/BA.md
        - agents/SWE.md
        - runtime/orchestration.yaml
    execution/schemas/task.schema.json:
      must_review:
        - agents/SWE.md
        - agents/QA.md
        - runtime/orchestration.yaml
    execution/schemas/requirement.json:
      must_review:
        - agents/BA.md
        - agents/SWE.md
        - runtime/orchestration.yaml
    execution/schemas/task.json:
      must_review:
        - agents/SWE.md
        - agents/QA.md
        - runtime/orchestration.yaml
    execution/schemas/test.json:
      must_review:
        - agents/QA.md
        - agents/SRE.md
        - runtime/orchestration.yaml
    execution/schemas/release.json:
      must_review:
        - agents/SRE.md
        - runtime/orchestration.yaml

validation:
  required_metadata_fields:
    - Version
    - Owner
    - Last Updated
  missing_evidence_token: Evidence not available
