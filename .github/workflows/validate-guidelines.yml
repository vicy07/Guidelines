name: Validate Guidelines

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install pytest
        run: python -m pip install pytest

      - name: Validate guidelines
        run: npm run validate-guidelines

      - name: Run tool helper tests
        run: python -m pytest tests/test_tools_otel.py tests/test_tools_sonar_runner.py -q
