version: 2
name: requirement-to-release

flow:
  - id: define_requirement
    role: BA
    input: raw_request
    output: requirement
    next: implement

  - id: implement
    role: SWE
    input: requirement
    output: tasks
    retry: 2
    next: test

  - id: test
    role: QA
    input: tasks
    output: test_report
    on_failure: implement
    next: release

  - id: release
    role: SRE
    input: test_report
    output: release
